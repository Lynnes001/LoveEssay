name: Deploy To Aliyun ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-aliyun-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
          port: ${{ secrets.ALIYUN_SSH_PORT }}
          source: "."
          target: "/root/LoveEssay"
          overwrite: true
          rm: false
          strip_components: 0

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          BASIC_AUTH_USER: ${{ secrets.BASIC_AUTH_USER }}
          BASIC_AUTH_PASS: ${{ secrets.BASIC_AUTH_PASS }}
          WORKFLOW_APP_ID: ${{ secrets.WORKFLOW_APP_ID }}
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
          port: ${{ secrets.ALIYUN_SSH_PORT }}
          envs: DASHSCOPE_API_KEY,BASIC_AUTH_USER,BASIC_AUTH_PASS,WORKFLOW_APP_ID
          script_stop: true
          script: |
            set -euo pipefail
            if [ -z "${DASHSCOPE_API_KEY:-}" ] || [ -z "${WORKFLOW_APP_ID:-}" ] || [ -z "${BASIC_AUTH_USER:-}" ] || [ -z "${BASIC_AUTH_PASS:-}" ]; then
              echo "缺少必填 GitHub Secrets: DASHSCOPE_API_KEY / WORKFLOW_APP_ID / BASIC_AUTH_USER / BASIC_AUTH_PASS"
              exit 1
            fi

            if [ "${BASIC_AUTH_PASS}" = "change-me" ]; then
              echo "BASIC_AUTH_PASS 不能为默认值 change-me"
              exit 1
            fi

            cd /root/LoveEssay
            chmod +x deploy.sh scripts/deploy_server.sh

            sudo mkdir -p /etc/loveessay
            sudo tee /etc/loveessay/loveessay.env > /dev/null <<EOT
            DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
            PORT=6789
            WORKFLOW_APP_ID=${WORKFLOW_APP_ID}
            RATE_LIMIT_PER_MINUTE=30
            BASIC_AUTH_USER=${BASIC_AUTH_USER}
            BASIC_AUTH_PASS=${BASIC_AUTH_PASS}
            EOT
            sudo chmod 600 /etc/loveessay/loveessay.env

            sudo ./deploy.sh

            sudo systemctl is-active loveessay
            sudo systemctl is-active nginx

            ok=0
            for i in $(seq 1 15); do
              if curl -sS --fail -u "${BASIC_AUTH_USER}:${BASIC_AUTH_PASS}" http://127.0.0.1:6788/api/health > /dev/null; then
                ok=1
                break
              fi
              sleep 2
            done

            if [ "$ok" -ne 1 ]; then
              echo "健康检查失败，输出服务诊断信息..."
              sudo systemctl status loveessay --no-pager || true
              sudo journalctl -u loveessay -n 120 --no-pager || true
              sudo systemctl status nginx --no-pager || true
              exit 1
            fi
